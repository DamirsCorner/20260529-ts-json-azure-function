<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Person Lookup</title>
  </head>
  <body>
    <h1>Person Lookup</h1>
    <div>
      <input type="text" id="idInput" placeholder="Enter person ID" />
      <button onclick="fetchPerson()">Search</button>
    </div>
    <div id="result"></div>

    <script>
      async function fetchPerson() {
        const id = document.getElementById("idInput").value;
        const resultDiv = document.getElementById("result");

        const response = await fetch(
          `/api/persons?id=${encodeURIComponent(id)}`,
        );

        if (response.ok) {
          const person = await response.json();
          resultDiv.textContent = `${person.firstName} ${person.lastName}`;
        } else {
          resultDiv.textContent = "No match found";
        }
      }
    </script>
  </body>
</html>
